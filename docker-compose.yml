services:
  api:
    build:
      context: .
      dockerfile: deploy/Dockerfile.api
    restart: unless-stopped
    environment:
      TF_CPP_MIN_LOG_LEVEL: "2"
    expose:
      - "8000"
  web:
    build:
      context: .
      dockerfile: deploy/Dockerfile.web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8080:80"
